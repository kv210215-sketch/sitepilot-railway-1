# SitePilot marketing-web — Railway staging deploy (Nixpacks)
# No production domains or secrets in this file.
# Railway injects PORT; bind 0.0.0.0 for health checks and routing.

[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
# Use Railway PORT (not package.json local dev port 3002)
startCommand = "npx next start -H 0.0.0.0 -p $PORT"
# Backend-independent liveness probe (see app/health/route.ts). Must NOT be "/",
# which is force-dynamic and returns 404 when the public API is unreachable.
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
