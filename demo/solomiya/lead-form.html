<!DOCTYPE html>
<!--
  Presenter aid: a stand-in for the visitor-facing contact form on the landing page.
  Posts to the REAL staging public endpoint POST /public/v1/leads (same call a page form makes).
  Open this in a browser tab during the meeting to demonstrate live lead capture.
  Test it ~5 min before the call.
-->
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Залишити заявку — Solomiya Energy</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,'Segoe UI',sans-serif}
  body{background:linear-gradient(135deg,#f5a623,#ff6b35);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.2);max-width:460px;width:100%;padding:36px}
  h1{font-size:1.5rem;margin-bottom:6px}
  .sub{color:#666;font-size:.95rem;margin-bottom:24px}
  label{display:block;font-size:.85rem;font-weight:600;color:#444;margin:14px 0 6px}
  input,textarea{width:100%;border:1.5px solid #e3e3e3;border-radius:8px;padding:12px 14px;font-size:1rem}
  input:focus,textarea:focus{outline:none;border-color:#f5a623}
  textarea{resize:vertical;min-height:84px}
  .consent{display:flex;align-items:flex-start;gap:8px;margin:16px 0 8px;font-size:.82rem;color:#666}
  .consent input{width:auto;margin-top:3px}
  button{width:100%;background:#f5a623;color:#000;font-weight:700;font-size:1.05rem;border:none;border-radius:10px;padding:15px;margin-top:18px;cursor:pointer}
  button:hover{background:#e6991a}
  button:disabled{opacity:.6;cursor:default}
  .ok{background:#e9f9ef;border:1.5px solid #22a35a;color:#1a7d44;border-radius:10px;padding:18px;margin-top:18px;display:none;font-size:.95rem}
  .ok.show{display:block}
</style>
</head>
<body>
  <div class="card">
    <h1>Безкоштовний аудит СЕС</h1>
    <p class="sub">Залиште заявку — інженер Solomiya Energy зв'яжеться з вами та підготує розрахунок окупності.</p>
    <form id="f">
      <label>Ім'я</label>
      <input id="name" value="Олександр Петренко" required>
      <label>Телефон</label>
      <input id="phone" value="+380671234567" required>
      <label>Email</label>
      <input id="email" type="email" value="o.petrenko@lvivsklad.ua">
      <label>Повідомлення</label>
      <textarea id="message">Цікавить СЕС ~120 кВт для складського комплексу у Львові. Який строк окупності та чи є фінансування?</textarea>
      <div class="consent"><input type="checkbox" id="consent" checked><span>Погоджуюся на обробку персональних даних</span></div>
      <button type="submit" id="btn">Замовити безкоштовний аудит</button>
    </form>
    <div class="ok" id="ok">✓ Дякуємо! Вашу заявку прийнято. Перевірте вкладку «Ліди» у кабінеті SitePilot.</div>
  </div>
<script>
  let API = 'https://sitepilot-railway-staging.up.railway.app';
  let PROJECT_ID = 'bc2a7b69-5b11-4b09-8a64-3a473b0db99f';
  let PAGE_PATH = '/ses-dlya-biznesu-lviv';
  // Best-effort: pick up live values from demo-state.json (written by run-demo.mjs)
  // so a reset/reproduced staging targets the current project. May be blocked under
  // file:// — that's fine, we keep the captured defaults. submit-lead.mjs is authoritative.
  fetch('./artifacts/demo-state.json')
    .then(r => r.ok ? r.json() : null)
    .then(s => { if (s) { API = s.api ?? API; PROJECT_ID = s.steps?.project?.id ?? PROJECT_ID; PAGE_PATH = s.steps?.page?.path ?? PAGE_PATH; } })
    .catch(() => {});
  // The visitor-facing public site (marketing-web) is not deployed in this staging,
  // so a fetch from this file:// page is cross-origin and the browser blocks it
  // (backend reflects CORS only for the SitePilot frontend host). For a clean on-screen
  // demo we ALWAYS show the thank-you; the authoritative lead is created reliably by the
  // helper `submit-lead.mjs`. If served from the allowed frontend origin, the fetch also works.
  document.getElementById('f').addEventListener('submit', (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn');
    btn.disabled = true;
    fetch(API + '/public/v1/leads', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        projectId: PROJECT_ID,
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value || undefined,
        message: document.getElementById('message').value || undefined,
        pagePath: PAGE_PATH,
        consent: document.getElementById('consent').checked,
      }),
    }).catch(() => {}); // CORS-blocked from file://; lead is created via helper instead
    document.getElementById('ok').classList.add('show');
    btn.textContent = '✓ Заявку надіслано';
  });
</script>
</body>
</html>
