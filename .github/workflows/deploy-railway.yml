name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd sitepilot/backend
          railway up --service sitepilot-railway

      - name: Verify backend health
        env:
          BACKEND_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "RAILWAY_BACKEND_URL secret not set — skipping health check"
            exit 0
          fi
          echo "Waiting 30s for deploy to settle..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/health")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend healthy: $BACKEND_URL/health → 200"
            curl -s "$BACKEND_URL/health"
          else
            echo "❌ Health check failed: HTTP $STATUS"
            exit 1
          fi

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd sitepilot/frontend
          railway up --service sitepilot-frontend
