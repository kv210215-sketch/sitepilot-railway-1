name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      backend_url:
        description: Backend URL for health check (e.g. https://api.example.up.railway.app)
        required: false
      frontend_url:
        description: Frontend URL for health check (e.g. https://app.example.up.railway.app)
        required: false

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sitepilot/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check RAILWAY_TOKEN
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "RAILWAY_TOKEN secret is not set."
            echo "Add repo secret RAILWAY_TOKEN from Railway -> Account -> Tokens."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service sitepilot-railway --detach

      - name: Verify backend health
        env:
          BACKEND_URL_SECRET: ${{ secrets.RAILWAY_BACKEND_URL }}
          BACKEND_URL_INPUT: ${{ inputs.backend_url }}
        run: |
          URL="$BACKEND_URL_SECRET"
          if [ -z "$URL" ]; then
            URL="$BACKEND_URL_INPUT"
          fi
          if [ -z "$URL" ]; then
            echo "RAILWAY_BACKEND_URL is not set, skipping backend health check."
            exit 0
          fi
          echo "Waiting 60s for backend deployment to settle..."
          sleep 60
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend health check passed."
              curl -s "$URL/health"
              exit 0
            fi
            echo "Attempt $i returned HTTP $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Backend health check failed."
          exit 1

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    defaults:
      run:
        working-directory: sitepilot/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check RAILWAY_TOKEN
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "RAILWAY_TOKEN secret is not set."
            echo "Add repo secret RAILWAY_TOKEN from Railway -> Account -> Tokens."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service sitepilot-frontend --detach

      - name: Verify frontend health
        env:
          FRONTEND_URL_SECRET: ${{ secrets.RAILWAY_FRONTEND_URL }}
          FRONTEND_URL_INPUT: ${{ inputs.frontend_url }}
        run: |
          URL="$FRONTEND_URL_SECRET"
          if [ -z "$URL" ]; then
            URL="$FRONTEND_URL_INPUT"
          fi
          if [ -z "$URL" ]; then
            echo "RAILWAY_FRONTEND_URL is not set, skipping frontend health check."
            exit 0
          fi
          echo "Waiting 60s for frontend deployment to settle..."
          sleep 60
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL/api/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Frontend health check passed."
              curl -s "$URL/api/health"
              exit 0
            fi
            echo "Attempt $i returned HTTP $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Frontend health check failed."
          exit 1
