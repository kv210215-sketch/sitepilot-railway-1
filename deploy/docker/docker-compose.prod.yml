version: "3.9"

# =============================================================================
# SitePilot — Production Stack (повний стек)
# Запуск: docker compose -f docker-compose.prod.yml up -d
# =============================================================================

networks:
  sitepilot-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  nginx-certs:

services:

  postgres:
    image: postgres:16-alpine
    container_name: sitepilot-postgres
    restart: always
    networks: [sitepilot-net]
    expose: ["5432"]
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
      - ./scripts/sitepilot_migration.sql:/docker-entrypoint-initdb.d/02-migration.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: sitepilot-redis
    restart: always
    networks: [sitepilot-net]
    expose: ["6379"]
    command: >
      redis-server --requirepass ${REDIS_PASS}
      --maxmemory 256mb --maxmemory-policy allkeys-lru
      --save 60 1 --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    container_name: sitepilot-backend
    restart: always
    networks: [sitepilot-net]
    expose: ["3001"]
    env_file: [./env/.env.production]
    environment:
      NODE_ENV:   production
      DB_HOST:    postgres
      DB_PORT:    5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${FRONTEND_API_URL:-https://app.solomiya-energy.com}
    container_name: sitepilot-frontend
    restart: always
    networks: [sitepilot-net]
    expose: ["3000"]
    environment:
      NODE_ENV: production
      PORT:     3000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: sitepilot-nginx
    restart: always
    networks: [sitepilot-net]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-certs:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
