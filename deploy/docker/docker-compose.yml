version: '3.8'

services:
  db:
    image: postgres:15
    container_name: sitepilot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sitepilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: sitepilot_backend
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: sitepilot_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data: